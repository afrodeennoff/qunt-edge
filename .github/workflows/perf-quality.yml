name: Perf Quality

on:
  pull_request:

permissions:
  contents: read

jobs:
  perf-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_DISABLE_FONT_DOWNLOADS: 1
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      ROUTE_BUDGET_KB: 300
      HIGH_PRIORITY_ROUTE_BUDGET_KB: 80
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run perf gate
        env:
          NODE_ENV: production
        run: npm run perf:check

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-summary
          path: docs/audits/artifacts/bundle-summary.json
