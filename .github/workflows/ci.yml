name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Clean Build Artifacts
        run: npm run clean:build-artifacts

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma Schema Validate
        run: npx prisma validate

      - name: Migration Directory Check
        run: |
          test -d prisma/migrations
          test -n "$(ls -A prisma/migrations)"

      - name: Unit Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Security Audit Report
        run: npm audit --json > npm-audit-report.json || true

      - name: Security Audit (high+)
        run: npm audit --audit-level=high

      - name: Upload Security Audit Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
