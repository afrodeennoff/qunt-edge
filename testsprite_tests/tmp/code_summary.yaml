version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js App Router
  - React
  - Tailwind CSS
  - Prisma
  - Supabase
  - Recharts
routes:
  - path: /:locale
    file: app/[locale]/(home)/page.tsx
    auth_required: false
    description: Home/marketing landing page.
  - path: /:locale/authentication
    file: app/[locale]/(authentication)/authentication/page.tsx
    auth_required: false
    description: Sign-in and authentication entrypoint.
  - path: /:locale/dashboard
    file: app/[locale]/dashboard/page.tsx
    auth_required: true
    description: Authenticated trading dashboard shell.
  - path: /:locale/dashboard/strategies
    file: app/[locale]/dashboard/strategies/page.tsx
    auth_required: true
    description: Strategy analytics and management.
  - path: /:locale/dashboard/settings
    file: app/[locale]/dashboard/settings/page.tsx
    auth_required: true
    description: User and app settings page.
  - path: /:locale/dashboard/import
    file: app/[locale]/dashboard/import/page.tsx
    auth_required: true
    description: Trade import and synchronization flow.
  - path: /:locale/dashboard/reports
    file: app/[locale]/dashboard/reports/page.tsx
    auth_required: true
    description: Performance and reporting views.
  - path: /:locale/dashboard/billing
    file: app/[locale]/dashboard/billing/page.tsx
    auth_required: true
    description: Billing and subscription management.
  - path: /:locale/updates
    file: app/[locale]/(landing)/updates/page.tsx
    auth_required: false
    description: Product update feed.
  - path: /:locale/pricing
    file: app/[locale]/(landing)/pricing/page.tsx
    auth_required: false
    description: Plans and pricing details.
  - path: /:locale/support
    file: app/[locale]/(landing)/support/page.tsx
    auth_required: false
    description: Support/contact page.
  - path: /:locale/propfirms
    file: app/[locale]/(landing)/propfirms/page.tsx
    auth_required: false
    description: Prop-firm content page.
  - path: /:locale/community
    file: app/[locale]/(landing)/community/page.tsx
    auth_required: false
    description: Community landing and posts.
  - path: /:locale/teams
    file: app/[locale]/teams/(landing)/page.tsx
    auth_required: false
    description: Teams landing page.
  - path: /:locale/teams/dashboard/:slug
    file: app/[locale]/teams/dashboard/[slug]/page.tsx
    auth_required: true
    description: Team dashboard per team slug.
  - path: /:locale/admin
    file: app/[locale]/admin/page.tsx
    auth_required: true
    description: Admin panel entrypoint.
features:
  - name: Email/password authentication
    description: Users authenticate before accessing protected dashboard routes.
    files:
      - app/[locale]/(authentication)/authentication/page.tsx
      - app/[locale]/dashboard/layout.tsx
    entry_route: /:locale/authentication
    user_interactions:
      - Enter email credentials.
      - Enter password.
      - Submit authentication form.
      - Get redirected into dashboard when valid.
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Dashboard analytics and widgets
    description: Users view metrics, charts, and trade tables on dashboard pages.
    files:
      - app/[locale]/dashboard/page.tsx
      - app/[locale]/dashboard/strategies/page.tsx
      - app/[locale]/dashboard/reports/page.tsx
    entry_route: /:locale/dashboard
    user_interactions:
      - Navigate between dashboard tabs/pages.
      - Filter and inspect trade statistics.
      - Open and interact with dashboard widgets.
    api_calls:
      - method: GET
        endpoint: /api/trades
      - method: GET
        endpoint: /api/user-data
    auth_required: true
  - name: Trade data import
    description: Users trigger import/sync flows for trade records.
    files:
      - app/[locale]/dashboard/import/page.tsx
      - app/api/sync/route.ts
    entry_route: /:locale/dashboard/import
    user_interactions:
      - Open import page.
      - Select provider/options.
      - Start synchronization/import job.
      - Confirm imported data appears in dashboard.
    api_calls:
      - method: POST
        endpoint: /api/sync
    auth_required: true
  - name: Pricing and marketing discovery
    description: Visitors browse product information and plans.
    files:
      - app/[locale]/(home)/page.tsx
      - app/[locale]/(landing)/pricing/page.tsx
      - app/[locale]/(landing)/support/page.tsx
    entry_route: /:locale
    user_interactions:
      - Browse public pages.
      - Navigate to pricing/support/updates.
      - Click CTAs to sign in.
    api_calls: []
    auth_required: false
  - name: Teams collaboration area
    description: Authenticated members manage team dashboards and analytics.
    files:
      - app/[locale]/teams/dashboard/[slug]/page.tsx
      - app/[locale]/teams/dashboard/[slug]/analytics/page.tsx
      - app/[locale]/teams/dashboard/[slug]/members/page.tsx
    entry_route: /:locale/teams/dashboard/:slug
    user_interactions:
      - Open team dashboard.
      - Review analytics and member/trader tabs.
      - Navigate between team sections.
    api_calls:
      - method: GET
        endpoint: /api/teams/:slug
    auth_required: true
known_limitations:
  - issue: TestSprite backend plan endpoint returns a backend-scope validation error in this workspace and requires backend-specific setup.
    location: testsprite_generate_backend_test_plan
    impact: Full mixed frontend+backend automated planning is partially blocked until backend scope is configured.
